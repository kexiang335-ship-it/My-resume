<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAO.KX | AI Agent (GPT-4 驱动)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #080808; color: #d4af37; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .logic-panel { background: rgba(15, 15, 15, 0.98); border: 1px solid #333; border-radius: 16px; transition: 0.3s; }
        .logic-panel:hover { border-color: #d4af37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
        input, select { background: #000 !important; color: #fff !important; border: 1px solid #444 !important; padding: 12px; border-radius: 8px; width: 100%; outline: none; font-size: 14px; }
        .btn-gold { background: #d4af37; color: #000; font-weight: 800; padding: 14px; border-radius: 10px; width: 100%; cursor: pointer; transition: 0.3s; }
        .btn-gold:hover:not(:disabled) { background: #fff; transform: scale(1.02); }
        .terminal-font { font-family: 'JetBrains Mono', monospace; }
        .cursor-blink::after { content: '█'; animation: blink 1s step-end infinite; color: #d4af37; margin-left: 4px; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex justify-between items-end border-b border-white/10 pb-6">
            <div>
                <h1 class="text-4xl font-black italic text-white text-white">SHAO.KX <span class="text-[#d4af37]">AGENT</span></h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-2">Professional AI Business OS</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="logic-panel p-6">
                    <div class="space-y-6">
                        <div>
                            <label class="text-[10px] text-slate-500 mb-2 block font-bold tracking-widest">1. CORE PRODUCT</label>
                            <input type="text" id="prod-input" placeholder="输入产品名称...">
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-500 mb-2 block font-bold tracking-widest">2. TARGET REGION</label>
                            <select id="region-input">
                                <option>欧洲市场</option>
                                <option>北美市场</option>
                                <option>中东市场</option>
                                <option>东南亚市场</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] text-[#d4af37] mb-2 block font-bold tracking-widest">3. INVITE CODE (OPTIONAL)</label>
                            <input type="text" id="invite-code" placeholder="输入 6 位数字体验码..." class="border-[#d4af37]/30">
                        </div>
                        <button onclick="executeAgent()" id="exec-btn" class="btn-gold">生成数字化报告</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="logic-panel h-[600px] flex flex-col relative overflow-hidden">
                    <div id="terminal-screen" class="p-8 flex-1 overflow-y-auto terminal-font text-sm leading-relaxed text-slate-300">
                        <div id="init-screen" class="h-full flex flex-col items-center justify-center opacity-30 text-[10px] tracking-[0.5em]">WAITING FOR COMMAND...</div>
                        <div id="output-area" class="hidden">
                            <div id="report-output" class="whitespace-pre-wrap text-white leading-relaxed"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function executeAgent() {
            const prod = document.getElementById('prod-input').value || "通用工业品";
            const region = document.getElementById('region-input').value;
            const code = document.getElementById('invite-code').value.trim();
            const btn = document.getElementById('exec-btn');
            const output = document.getElementById('report-output');

            btn.disabled = true;
            btn.innerText = "数据处理中...";
            document.getElementById('init-screen').classList.add('hidden');
            document.getElementById('output-area').classList.remove('hidden');
            output.innerHTML = "";
            output.classList.add('cursor-blink');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code: code,
                        messages: [{ role: "user", parts: [{ text: `请针对${prod}在${region}市场生成外贸报告。要求专业、详细。` }] }]
                    })
                });

                const data = await response.json();
                const text = data.answer;

                let i = 0;
                const timer = setInterval(() => {
                    if (i < text.length) {
                        output.innerHTML += text.charAt(i);
                        i++;
                        document.getElementById('terminal-screen').scrollTop = 9999;
                    } else {
                        clearInterval(timer);
                        output.classList.remove('cursor-blink');
                        btn.disabled = false;
                        btn.innerText = "重新生成报告";
                    }
                }, 15);

            } catch (error) {
                output.innerHTML = "系统连接异常，请稍后重试。";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
