<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAO.KX | 全链路外贸 AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #080808; color: #d4af37; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .logic-panel { background: rgba(15, 15, 15, 0.98); border: 1px solid #333; border-radius: 16px; transition: 0.3s; }
        .logic-panel:hover { border-color: #d4af37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
        .terminal-font { font-family: 'JetBrains Mono', monospace; }
        input, select { background: #000 !important; color: #fff !important; border: 1px solid #444 !important; padding: 12px; border-radius: 8px; width: 100%; outline: none; font-size: 14px; }
        .btn-gold { background: #d4af37; color: #000; font-weight: 800; padding: 14px; border-radius: 10px; width: 100%; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-gold:hover:not(:disabled) { background: #fff; transform: scale(1.02); }
        .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; }
        .cursor-blink::after { content: '█'; animation: blink 1s step-end infinite; color: #d4af37; margin-left: 4px; }
        @keyframes blink { 50% { opacity: 0; } }
        /* 隐藏弹窗的样式 */
        #admin-modal { background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="p-4 md:p-10 relative">
    
    <button id="admin-btn" onclick="document.getElementById('admin-modal').classList.remove('hidden')" class="hidden absolute top-4 right-4 z-50 bg-[#d4af37] text-black text-xs font-bold px-4 py-2 rounded shadow-lg hover:bg-white transition">
        ⚡ 老板控制台
    </button>

    <div id="admin-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center">
        <div class="bg-[#111] border border-[#d4af37] p-8 rounded-2xl w-96 text-center shadow-[0_0_30px_rgba(212,175,55,0.2)]">
            <h2 class="text-xl font-black text-white mb-2">专属体验码生成器</h2>
            <p class="text-xs text-slate-400 mb-6">每次生成包含 3 次使用额度</p>
            <div id="new-code-display" class="text-4xl font-mono text-[#d4af37] tracking-widest mb-6 font-bold h-12">------</div>
            <button onclick="generateCode()" class="w-full bg-white text-black font-bold py-3 rounded-lg hover:bg-[#d4af37] transition mb-3">一键生成新码</button>
            <button onclick="document.getElementById('admin-modal').classList.add('hidden')" class="text-xs text-slate-500 hover:text-white">关闭窗口</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto mt-8">
        <header class="mb-10 flex justify-between items-end border-b border-white/10 pb-6">
            <div>
                <h1 class="text-4xl font-black italic text-white">SHAO.KX <span class="text-[#d4af37]">AGENT</span></h1>
                <p id="secret-title" class="text-[10px] text-slate-500 uppercase tracking-[0.3em] mt-2 cursor-pointer select-none">2026 中国外贸经营数字化操作系统</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="logic-panel p-6">
                    <h3 class="text-[11px] font-black text-white mb-6 uppercase flex items-center gap-2">
                        <span class="w-2 h-2 bg-[#d4af37] rounded-full"></span> 经营参数输入
                    </h3>
                    <div class="space-y-6">
                        <div>
                            <label class="text-[10px] text-slate-500 mb-2 block font-bold">1. 核心产品线</label>
                            <input type="text" id="prod-input" placeholder="例如：激光切割机">
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-500 mb-2 block font-bold">2. 战略目标区域</label>
                            <select id="region-input">
                                <option>德国/欧洲市场</option>
                                <option>沙特/中东市场</option>
                                <option>美国/北美市场</option>
                                <option>越南/东南亚市场</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] text-[#d4af37] mb-2 block font-bold">3. 专属体验码 (新客户选填)</label>
                            <input type="text" id="invite-code" placeholder="输入 6 位数字体验码..." class="border-[#d4af37]/30 focus:border-[#d4af37]">
                        </div>
                        <button onclick="executeAgent()" id="exec-btn" class="btn-gold">启动 AI 深度生成报告</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="logic-panel min-h-[650px] flex flex-col relative overflow-hidden">
                    <div id="terminal-screen" class="p-8 flex-1 overflow-y-auto terminal-font text-sm leading-relaxed">
                        <div id="init-screen" class="h-full flex flex-col items-center justify-center opacity-20 text-[10px] tracking-[0.8em]">SYSTEM READY_</div>
                        <div id="output-area" class="hidden">
                            <div id="thought-process" class="text-[11px] text-slate-600 mb-8 space-y-1.5 border-l border-white/10 pl-4 italic"></div>
                            <div id="report-output" class="text-slate-200 leading-[1.8] whitespace-pre-wrap"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 核心：设备指纹生成器 ---
        function getDeviceId() {
            let deviceId = localStorage.getItem('shao_device_id');
            if (!deviceId) {
                // 收集基础指纹特征 (屏幕、内核、语言等)
                const fpData = [navigator.userAgent, screen.width, screen.height, navigator.language].join('|');
                let hash = 0;
                for (let i = 0; i < fpData.length; i++) {
                    hash = ((hash << 5) - hash) + fpData.charCodeAt(i);
                    hash |= 0; 
                }
                // 生成唯一的设备 ID 并加密固化在本地
                deviceId = 'DEV-' + Math.abs(hash).toString(16) + '-' + Math.random().toString(36).substring(2, 10);
                localStorage.setItem('shao_device_id', deviceId);
            }
            return deviceId;
        }

        // 老板专属快捷通道：连点三次副标题获取设备ID
        let clickCount = 0;
        document.getElementById('secret-title').addEventListener('click', () => {
            clickCount++;
            if (clickCount >= 3) {
                prompt("这是你的设备专属 ID，请复制并添加到后端白名单中：", getDeviceId());
                clickCount = 0;
            }
        });

        const currentDeviceId = getDeviceId();

        // 页面加载时，静默询问后端：当前是不是老板的设备？
        window.onload = async function() {
            try {
                const res = await fetch('/api/admin', {
                    headers: { 'X-Device-Id': currentDeviceId } // 传入设备ID
                });
                const data = await res.json();
                if(data.isAdmin) {
                    document.getElementById('admin-btn').classList.remove('hidden'); // 是老板，显示按钮
                }
            } catch(e) {}
        }

        // 老板生成体验码的逻辑
        async function generateCode() {
            const display = document.getElementById('new-code-display');
            display.innerText = "生成中...";
            try {
                const res = await fetch('/api/admin', { 
                    method: 'POST',
                    headers: { 'X-Device-Id': currentDeviceId } // 必须传入才能被鉴权
                });
                const data = await res.json();
                if(data.code) {
                    display.innerText = data.code;
                } else {
                    display.innerText = "生成失败: " + (data.error || "未知原因");
                }
            } catch(e) {
                display.innerText = "网络错误";
            }
        }

        // 生成报告逻辑
        async function executeAgent() {
            const prod = document.getElementById('prod-input').value || "通用工业品";
            const region = document.getElementById('region-input').value;
            const inviteCode = document.getElementById('invite-code').value.trim(); 
            
            const btn = document.getElementById('exec-btn');
            const terminal = document.getElementById('terminal-screen');
            const reportOutput = document.getElementById('report-output');
            const thoughtDiv = document.getElementById('thought-process');

            btn.disabled = true;
            btn.innerText = "正在分析中...";
            document.getElementById('init-screen').classList.add('hidden');
            document.getElementById('output-area').classList.remove('hidden');
            reportOutput.innerHTML = "";
            thoughtDiv.innerHTML = "> [SYSTEM] 验证权限中...<br>";

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Device-Id': currentDeviceId // 将设备ID发给后端，后端通过它判断是否用过免费次数
                    },
                    body: JSON.stringify({
                        code: inviteCode,
                        messages: [{ role: "user", parts: [{ text: `你是一个资深外贸顾问。针对产品"${prod}"，在"${region}"市场，请生成一份报告。包含：1.市场逻辑（结合2026趋势） 2.目标客户类型 3.一份专业英文开发信。要求：格式精美，多用换行。` }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    reportOutput.innerHTML = `<span class="text-red-500">❌ 错误：${data.error}</span><br>如果免费次数已用完，请在左侧输入专属体验码。`;
                    btn.disabled = false;
                    btn.innerText = "重新启动生成";
                    return;
                }

                const text = data.answer;
                reportOutput.classList.add('cursor-blink');

                let i = 0;
                const timer = setInterval(() => {
                    if (i < text.length) {
                        reportOutput.innerHTML += text.charAt(i);
                        i++;
                        terminal.scrollTop = terminal.scrollHeight;
                    } else {
                        clearInterval(timer);
                        reportOutput.classList.remove('cursor-blink');
                        btn.disabled = false;
                        btn.innerText = "重新启动生成";
                    }
                }, 15);

            } catch (error) {
                reportOutput.innerHTML = "系统错误，请重试。";
                btn.disabled = false;
                btn.innerText = "重试";
            }
        }
    </script>
</body>
</html>
